# =============================================================================
# Deployment
#
# カスタマイズ箇所:
#   - <NAMESPACE>       : プロジェクト名
#   - <MIRROR_REGISTRY> : ミラーレジストリのホスト名
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-server
  namespace: <NAMESPACE>
  labels:
    app: hello-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hello-server
  template:
    metadata:
      labels:
        app: hello-server
    spec:
      containers:
        - name: hello-server
          image: <MIRROR_REGISTRY>/sample-simple-cicd-app/hello-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
